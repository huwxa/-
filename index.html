<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합사회 단계별 완벽 정복 시스템</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #16a34a;
            --danger: #dc2626;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--gray-100);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary);
            margin: 0 0 8px 0;
            font-size: 26px;
        }

        .level-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 10px;
        }

        .level-tabs.lower {
            margin-bottom: 25px;
        }

        .tab-btn {
            padding: 10px 5px;
            border: 1px solid var(--gray-200);
            background: var(--gray-100);
            color: var(--gray-700);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quiz-section { display: none; }
        .quiz-section.active { display: block; }

        .score-board {
            background: var(--primary-light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 15px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .q-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn-check {
            padding: 10px 16px;
            background: var(--gray-700);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .feedback {
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 13px;
        }

        .feedback.correct {
            display: block;
            background-color: #dcfce7;
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .feedback.wrong {
            display: block;
            background-color: #fee2e2;
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .analysis-box {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #cbd5e1;
            color: #475569;
        }

        .supplement-badge {
            display: inline-block;
            background: #f1f5f9;
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 통합사회 레벨별 완벽 정복 시스템</h1>
        <p>기초부터 심화까지 완벽 단계별 학습 & 취약점 처방 오답노트</p>
    </header>

    <!-- 상단 탭 레이아웃 (2줄 구성) -->
    <div class="level-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'lvl1')">1. 기초 (15문항)</button>
        <button class="tab-btn" onclick="switchTab(event, 'lvl2')">2. 하 (15문항)</button>
        <button class="tab-btn" onclick="switchTab(event, 'lvl3')">3. 중 (15문항)</button>
    </div>
    <div class="level-tabs lower">
        <button class="tab-btn" onclick="switchTab(event, 'lvl4')">4. 상 (15문항)</button>
        <button class="tab-btn" onclick="switchTab(event, 'lvl5')">5. 최상 (15문항)</button>
        <button class="tab-btn" onclick="switchTab(event, 'lvl6')">6. 최고존엄 (15문항)</button>
    </div>

    <!-- 각 레벨별 컨테이너 -->
    <div id="lvl1" class="quiz-section active">
        <div class="score-board">1단계: 핵심 용어 뼈대 잡기</div>
        <div id="container-lvl1"></div>
    </div>

    <div id="lvl2" class="quiz-section">
        <div class="score-board">2단계: 기본 개념 다지기</div>
        <div id="container-lvl2"></div>
    </div>

    <div id="lvl3" class="quiz-section">
        <div class="score-board">3단계: 핵심 개념 응용 및 이해</div>
        <div id="container-lvl3"></div>
    </div>

    <div id="lvl4" class="quiz-section">
        <div class="score-board">4단계: 자료 분석 및 심화 개념</div>
        <div id="container-lvl4"></div>
    </div>

    <div id="lvl5" class="quiz-section">
        <div class="score-board">5단계: 고난도 함정 돌파</div>
        <div id="container-lvl5"></div>
    </div>

    <div id="lvl6" class="quiz-section">
        <div class="score-board">6단계: 1등급을 가르는 최고난도 평가</div>
        <div id="container-lvl6"></div>
    </div>
</div>

            { q: "전통사회의 공동체적 가치관과 유대감이 도시화 과정에서 해체되면서 나타나는 무규범 상태의 용어는?", a: ["아노미", "아노미현상"], t: "도시화의 문제점", h: "초성 힌트: ㅇㄴㅁ" },
            { q: "특정 지역의 주민들이 선호하지 않는 혐오 시설이 자신들의 지역에 들어오는 것을 결사반대하는 현상은?", a: ["님비", "님비현상"], t: "지역 이기주의", h: "초성 힌트: ㄴㅂ" },
            { q: "반대로 지역의 경제적 이익이 되는 선호 시설을 기를 쓰고 유치하려는 지역 이기주의 현상은?", a: ["핌피", "핌피현상"], t: "지역 이기주의", h: "초성 힌트: ㅍㅍ" },
            { q: "문화 변동에서 외래종교가 들어와 토착 신앙과 결합하여 전혀 새로운 종교적 형태로 정착하는 현상은?", a: ["문화융합"], t: "문화 변동 결과", h: "초성 힌트: ㅁㅎㅇㅎ" },
            { q: "레오폴드가 주장한 대지 윤리에서 도덕적 고려의 범주에 포함되는 비생물적 요소의 총합은?", a: ["대지", "흙"], t: "인간과 자연의 관계", h: "초성 힌트: ㄷㅈ" }
        ]
    };

    // 탭 전환 함수 (오류 없음 보장)
    function switchTab(e, levelId) {
        document.querySelectorAll('.quiz-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(levelId).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // 6개 레벨 전체를 화면에 렌더링하는 함수
    function initAllQuizzes() {
        Object.keys(quizData).forEach(level => {
            const container = document.getElementById(`container-${level}`);
            if (!container) return;
            
            container.innerHTML = ""; // 기존 내용 초기화
            
            quizData[level].forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="supplement-badge">${item.t}</span>
                    <div class="q-title">Q${index + 1}. ${item.q}</div>
                    <div class="input-group">
                        <input type="text" id="ans-${level}-${index}" placeholder="정답 입력">
                        <button class="btn-check" onclick="checkAns('${level}', ${index})">확인</button>
                    </div>
                    <div class="feedback" id="feed-${level}-${index}"></div>
                `;
                container.appendChild(card);
            });
        });
    }

    // 채점 및 피드백 처리 함수
    function checkAns(level, idx) {
        const userAns = document.getElementById(`ans-${level}-${idx}`).value.trim();
        const feedBox = document.getElementById(`feed-${level}-${idx}`);
        const data = quizData[level][idx];

        // 대소문자나 띄어쓰기 오차 줄이기 위해 정답 리스트 체크
        if (data.a.includes(userAns)) {
            feedBox.className = "feedback correct";
            feedBox.innerHTML = `🎉 정답입니다! <div class="analysis-box"><b>해설/힌트:</b> ${data.h}</div>`;
        } else {
            feedBox.className = "feedback wrong";
            feedBox.innerHTML = `❌ 틀렸습니다. 다시 생각해 보세요! <div class="analysis-box"><b>해설/힌트:</b> ${data.h}</div>`;
        }
    }

    // 페이지 로드 시 전체 구동
    window.onload = function() {
        initAllQuizzes();
    };
</script>
</body>
</html>
