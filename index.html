<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합사회 단계별 완벽 정복 시스템</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #e0e7ff;
            --success: #16a34a;
            --danger: #dc2626;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --text-main: #1f2937;
        }

        body {
            font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
            background-color: #f8fafc;
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            line-height: 1.6;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--gray-100);
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary);
            margin: 0 0 8px 0;
            font-size: 26px;
        }

        .level-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 25px;
        }

        .tab-btn {
            padding: 10px 5px;
            border: 1px solid var(--gray-200);
            background: var(--gray-100);
            color: var(--gray-700);
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .quiz-section { display: none; }
        .quiz-section.active { display: block; }

        .score-board {
            background: var(--primary-light);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
            font-size: 15px;
        }

        .card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
        }

        .q-title {
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn-check {
            padding: 10px 16px;
            background: var(--gray-700);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }

        .feedback {
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            display: none;
            font-size: 13px;
        }

        .feedback.correct {
            display: block;
            background-color: #dcfce7;
            color: var(--success);
            border-left: 4px solid var(--success);
        }

        .feedback.wrong {
            display: block;
            background-color: #fee2e2;
            color: var(--danger);
            border-left: 4px solid var(--danger);
        }

        .analysis-box {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed #cbd5e1;
            color: #475569;
        }

        .supplement-badge {
            display: inline-block;
            background: #f1f5f9;
            color: var(--primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎯 통합사회 레벨별 완벽 정복 시스템</h1>
        <p>기초부터 심화까지 완벽 단계별 학습 & 취약점 처방 오답노트</p>
    </header>

    <div class="level-tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'lvl1')">1. 기초</button>
        <button class="tab-btn" onclick="switchTab(event, 'lvl2')">2. 하</button>
        <button class="tab-btn" onclick="switchTab(event, 'lvl3')">3. 중</button>
    </div>

    <div id="lvl1" class="quiz-section active">
        <div class="score-board">1단계: 핵심 용어 뼈대 잡기</div>
        <div id="container-lvl1"></div>
    </div>

    <div id="lvl2" class="quiz-section">
        <div class="score-board">2단계: 준비 중</div>
        <p style="text-align:center; color:#94a3b8;">데이터를 추가하는 중입니다.</p>
    </div>

    <div id="lvl3" class="quiz-section">
        <div class="score-board">3단계: 준비 중</div>
        <p style="text-align:center; color:#94a3b8;">데이터를 추가하는 중입니다.</p>
    </div>
</div>

<script>
    const quizData = {
        lvl1: [
            { q: "오랜 기간 비가 내리지 않아 물이 부족해지는 진행이 느린 기후 재해는?", a: ["가뭄"], t: "자연재해", h: "초성 힌트: ㄱㅁ" },
            { q: "열대저기압으로 최대풍속이 17m/s 이상이며 폭염 해결에 도움을 주는 재해는?", a: ["태풍"], t: "자연재해", h: "초성 힌트: ㅌㅍ" },
            { q: "인간과 자연을 분리하여 바라보고 자연의 도구적 가치를 강조하는 세계관은?", a: ["인간중심주의"], t: "인간과 자연의 관계", h: "초성 힌트: ㅇㄱㅈㅅㅈㅇ" },
            { q: "도덕적 고려 대상을 인간, 동물, 식물뿐만 아니라 대지 전체로 넓힌 사상가는?", a: ["레오폴드"], t: "인간과 자연의 관계", h: "초성 힌트: ㄹㅇㅍㄷ" },
            { q: "우주의 모든 존재가 원인과 조건에 의해 상호 의존한다는 불교의 핵심 교리는?", a: ["연기설", "연기사상"], t: "동양의 전통 자연관", h: "초성 힌트: ㅇㄱㅅ" },
            { q: "오존층 파괴를 유발하는 프레온가스(CFCs)의 생산 및 사용을 규제한 1987년 협약은?", a: ["몬트리올의정서", "몬트리올 의정서"], t: "주요 국제 협약", h: "초성 힌트: ㅁㅌㄹㅇㅇㅈㅅ" },
            { q: "물새 서식지로서 국제적으로 중요한 가치를 지니는 습지를 보호하기 위한 협약은?", a: ["람사르협약", "람사르 협약"], t: "주요 국제 협약", h: "초성 힌트: ㄹㅅㄹㅎㅇ" },
            { q: "이전에 없던 문화 요소를 새롭게 만들어 내는 내재적 문화 변동 요인은?", a: ["발명"], t: "문화 변동 요인", h: "초성 힌트: ㅂㅁ" },
            { q: "이미 존재하고 있었으나 세상에 알려지지 않은 것을 찾아내는 내재적 요인은?", a: ["발견"], t: "문화 변동 요인", h: "초성 힌트: ㅂㄱ" },
            { q: "전쟁이나 교역 등 인적 접촉을 통해 타국의 문화가 직접 전달되는 전파 방식은?", a: ["직접전파", "직접 전파"], t: "문화 변동 요인", h: "초성 힌트: ㅈㅈㅈㅍ" },
            { q: "인터넷이나 드라마, 인쇄물 등의 매개체를 통해 문화가 전달되는 전파 방식은?", a: ["간접전파", "간접 전파"], t: "문화 변동 요인", h: "초성 힌트: ㄱㅈㅈㅍ" },
            { q: "타문화의 아이디어를 얻어 새로운 문화 요소를 창조하는 변동 요인은?", a: ["자극전파", "자극 전파"], t: "문화 변동 요인", h: "초성 힌트: ㅈㄱㅈㅍ" },
            { q: "자신의 문화만을 우월하게 여기고 타문화를 부정적으로 평가하는 문화 이해 태도는?", a: ["자문화중심주의", "자문화 중심주의"], t: "문화를 이해하는 태도", h: "초성 힌트: ㅈㅁㅎㅈㅅㅈㅇ" },
            { q: "특정 지역이나 시설로 도달하기 편리한 정도를 뜻하는 용어로 도심이 가장 높은 것은?", a: ["접근성"], t: "도시 내부 구조", h: "초성 힌트: ㅈㄱㅅ" },
            { q: "토지 이용자가 토지 소유자에게 지불하는 토지 이용 대가(임대료)를 뜻하는 말은?", a: ["지대"], t: "도시 내부 구조", h: "초성 힌트: ㅈㄷ" }
        ]
    };

    // 탭 전환 함수 오류 수정 완료
    function switchTab(e, levelId) {
        document.querySelectorAll('.quiz-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(levelId).classList.add('active');
        e.currentTarget.classList.add('active');
    }

    // 퀴즈 렌더링 함수
    function initQuiz() {
        const container = document.getElementById('container-lvl1');
        container.innerHTML = ""; // 초기화
        quizData.lvl1.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="supplement-badge">${item.t}</span>
                <div class="q-title">Q${index + 1}. ${item.q}</div>
                <div class="input-group">
                    <input type="text" id="ans-${index}" placeholder="정답 입력">
                    <button class="btn-check" onclick="checkAns(${index})">확인</button>
                </div>
                <div class="feedback" id="feed-${index}"></div>
            `;
            container.appendChild(card);
        });
    }

    // 채점 함수
    function checkAns(idx) {
        const userAns = document.getElementById(`ans-${idx}`).value.trim();
        const feedBox = document.getElementById(`feed-${idx}`);
        const data = quizData.lvl1[idx];

        if (data.a.includes(userAns)) {
            feedBox.className = "feedback correct";
            feedBox.innerHTML = `🎉 정답입니다! <div class="analysis-box">${data.h}</div>`;
        } else {
            feedBox.className = "feedback wrong";
            feedBox.innerHTML = `❌ 틀렸습니다. 다시 생각해 보세요! <div class="analysis-box">${data.h}</div>`;
        }
    }

    // 실행
    window.onload = function() {
        initQuiz();
    };
</script>
</body>
</html>
